{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}ShopNest{% endblock %}</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">

  <style>
    /* ========== NAVBAR ========== */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 28px;
      background: #ffffff;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      text-decoration: none;
      color: #1a1a2e;
    }

    .logo-box {
      width: 34px;
      height: 34px;
      background: #1a1a2e;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-weight: 700;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .nav-links a {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
      color: #666;
      text-decoration: none;
      padding: 8px 10px;
      border-radius: 8px;
    }

    .nav-links a:hover {
      background: rgba(233,69,96,0.08);
      color: #e94560;
    }

    /* CTA */
    .nav-cta {
      background: #e94560 !important;
      color: white !important;
      padding: 8px 14px !important;
      border-radius: 10px;
      font-weight: 600;
    }

    /* PROFILE */
    .profile-dropdown {
      position: relative;
    }

    .profile-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1.5px solid #e8e4e0;
      background: #f8f4f0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      right: 0;
      top: 45px;
      background: white;
      border: 1px solid #e8e4e0;
      border-radius: 12px;
      min-width: 180px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    }

    .profile-dropdown:hover .dropdown-menu {
      display: block;
    }

    .dropdown-menu a {
      display: flex;
      gap: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #333;
      text-decoration: none;
    }

    .dropdown-menu a:hover {
      background: #f8f4f0;
    }

    .logout-link {
      color: #e94560 !important;
      border-top: 1px solid #eee;
    }

    /* MESSAGES */
    .messages-container {
      max-width: 700px;
      margin: 1rem auto;
    }

    .alert {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    .alert.success { background: #d4edda; color: #155724; }
    .alert.warning { background: #fff3cd; color: #856404; }
    .alert.error { background: #f8d7da; color: #721c24; }

    /* FOOTER */
    .footer {
      background: #1a1a2e;
      color: rgba(255,255,255,0.6);
      padding: 3rem 2rem 1rem;
      margin-top: 40px;
    }

    .footer-bottom {
      text-align: center;
      border-top: 1px solid rgba(255,255,255,0.1);
      padding-top: 1rem;
      font-size: 0.85rem;
    }
  </style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">

  <a href="{% url 'user_home' %}" class="logo">
    <div class="logo-box">S</div>
    ShopNest
  </a>

  <div class="nav-links">

    <a href="{% url 'user_home' %}">Home</a>
    <a href="#">Products</a>
    <a href="#">Wishlist</a>
    <a href="#">Orders</a>

    <a href="{% url 'add_product' %}" class="nav-cta">
      <i class="fa-solid fa-plus"></i> Add Product
    </a>

    <div class="profile-dropdown">
      <button class="profile-btn">
        <i class="fa-regular fa-user"></i>
      </button>

      <div class="dropdown-menu">
        <a href="#">My Profile</a>
        <a href="#">My Orders</a>
        <a href="{% url 'home' %}" class="logout-link">Logout</a>
      </div>
    </div>

  </div>
</nav>

<!-- MESSAGES -->
{% if messages %}
  <div class="messages-container">
    {% for message in messages %}
      <div class="alert {{ message.tags }}">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}

<!-- PAGE CONTENT -->
{% block content %}{% endblock %}

<!-- FOOTER -->
<footer class="footer">
  <div class="footer-bottom">
    &copy; 2024 ShopNest
  </div>
</footer>

</body>
</html>
